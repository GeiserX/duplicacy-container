<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6522C"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/><line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Container / Helm icon -->
  <g transform="translate(65, 50)">
    <!-- Container box -->
    <rect x="0" y="20" width="70" height="60" rx="4" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <!-- Container ridges -->
    <line x1="18" y1="20" x2="18" y2="80" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="20" x2="35" y2="80" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <line x1="52" y1="20" x2="52" y2="80" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <!-- Helm wheel -->
    <circle cx="55" cy="15" r="10" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <circle cx="55" cy="15" r="3" fill="#ffffff" opacity="0.4"/>
    <line x1="55" y1="5" x2="55" y2="3" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="55" y1="25" x2="55" y2="27" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="45" y1="15" x2="43" y2="15" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="65" y1="15" x2="67" y2="15" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  </g>

  <text x="195" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-1">
    duplicacy-container
  </text>

  <text x="197" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    Container image and Helm chart for Duplicacy on Kubernetes
  </text>

  <g transform="translate(780, 50)">
    <rect x="0" y="0" width="8" height="100" rx="4" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="0" y="30" width="8" height="70" rx="4" fill="#ffffff" fill-opacity="0.4"/>
    <rect x="20" y="0" width="8" height="100" rx="4" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="20" y="50" width="8" height="50" rx="4" fill="#ffffff" fill-opacity="0.4"/>
    <rect x="40" y="0" width="8" height="100" rx="4" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="40" y="15" width="8" height="85" rx="4" fill="#ffffff" fill-opacity="0.4"/>
    <rect x="60" y="0" width="8" height="100" rx="4" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="60" y="40" width="8" height="60" rx="4" fill="#ffffff" fill-opacity="0.4"/>
  </g>
</svg>
