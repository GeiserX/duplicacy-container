{{- if .Values.exporter.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "duplicacy.fullname" . }}-test-connection"
  labels:
    {{- include "duplicacy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  automountServiceAccountToken: false
  containers:
    - name: wget
      image: busybox:1.36.1
      command:
        - /bin/sh
        - -ec
      args:
        - wget -qO- "http://{{ include "duplicacy.fullname" . }}-exporter:{{ .Values.exporter.port }}/health"
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65534
  restartPolicy: Never
{{- end }}
