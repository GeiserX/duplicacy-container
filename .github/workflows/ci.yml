name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  helm:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ./charts/duplicacy

      - name: Render default chart
        run: helm template duplicacy ./charts/duplicacy >/tmp/duplicacy-default.yaml

      - name: Render existing secret and PVC path
        run: >
          helm template duplicacy ./charts/duplicacy
          --set cron.existingSecret=duplicacy-secret
          --set cron.config.existingClaim=duplicacy-config
          --set cron.periodic.existingClaim=duplicacy-periodic
          --set sharedLogs.existingClaim=duplicacy-logs
          >/tmp/duplicacy-existing.yaml

      - name: Render web-enabled variant
        run: >
          helm template duplicacy ./charts/duplicacy
          --set web.enabled=true
          --set web.image.repository=test/duplicacy-web
          --set web.image.tag=1.0.0
          >/tmp/duplicacy-web.yaml

  docker:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
